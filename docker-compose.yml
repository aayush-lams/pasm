version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pasm
      POSTGRES_USER: pasm
      POSTGRES_PASSWORD: pasm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pasm"]
      interval: 5s
      timeout: 3s
      retries: 5

  pasm:
    build: .
    ports:
      - "3000:3000"
    environment:
      PASM_DATABASE_URL: postgres://pasm:pasm@postgres:5432/pasm
      PASM_SERVER_ADDR: 0.0.0.0:3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
